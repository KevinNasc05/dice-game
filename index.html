<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Dicee</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
      <header>
        <h1>Refresh Me</h1>
      </header>

      <main>
        <div class="player one">
          <p>Player 1</p>

          <div class="dice">
            <div class="cell one"><div class="circle"></div></div>
            <div class="cell two"><div class="circle"></div></div>
            <div class="cell three"><div class="circle"></div></div>
            <div class="cell four invisible"><div class="circle"></div></div>
            <div class="cell five"><div class="circle"></div></div>
            <div class="cell six invisible"><div class="circle"></div></div>
            <div class="cell seven"><div class="circle"></div></div>
            <div class="cell eight"><div class="circle"></div></div>
            <div class="cell nine"><div class="circle"></div></div>
          </div>
        </div>

        <div class="player two">
          <p>Player 2</p>

          <div class="dice">
            <div class="cell one"><div class="circle"></div></div>
            <div class="cell two invisible"><div class="circle"></div></div>
            <div class="cell three"><div class="circle"></div></div>
            <div class="cell four"><div class="circle"></div></div>
            <div class="cell five"><div class="circle"></div></div>
            <div class="cell six"><div class="circle"></div></div>
            <div class="cell seven"><div class="circle"></div></div>
            <div class="cell eight invisible"><div class="circle"></div></div>
            <div class="cell nine"><div class="circle"></div></div>
          </div>
        </div>
      </main>

      <footer>
        <p>Kevin's Dice App</p>
      </footer>

      <script src="index.js"></script>
  </body>
</html>
